# SSG Finance — Nginx location block for the app.
#
# The server team has already configured the main reverse proxy.
# This snippet covers the SSE-specific settings needed for real-time
# dashboard updates. If live updates (payments-changed, accounts-changed,
# fees-changed events) do not reach the browser, add these directives
# to the existing location / block.
#
# Reference: the SSE endpoint is at GET /Home/Events

location / {
    proxy_pass http://127.0.0.1:PORT;
    proxy_http_version 1.1;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    client_max_body_size 100m;
}

# SSE endpoint — disable buffering so events stream in real time.
# Without these, the browser's EventSource will stall after the first event.
location /Home/Events {
    proxy_pass http://127.0.0.1:PORT;
    proxy_http_version 1.1;

    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Connection '';
    chunked_transfer_encoding off;
}
